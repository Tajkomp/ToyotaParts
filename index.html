<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Premium Parts | Wet Asphalt Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --accent-color: #eb0a1e;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 1);
            --text-color: #e0e0e0;
            --modal-bg: rgba(15, 15, 15, 0.95);
            --gold-color: #f39c12;
            --success-color: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 20, 25, 0.8), #050505), url('https://www.transparenttextures.com/patterns/asphalt-dark.png');
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .header-top { width: 100%; max-width: 1400px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #fff; text-shadow: 0 0 15px rgba(235, 10, 30, 0.5); text-decoration: none; min-width: fit-content; }
        
        .catalog-btn { background: var(--accent-color); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(235, 10, 30, 0.3); }
        .catalog-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(235, 10, 30, 0.6); }

        .search-container { position: relative; flex-grow: 1; max-width: 500px; }
        .smart-search { width: 100%; padding: 12px 20px 12px 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 30px; color: white; outline: none; transition: 0.3s; }
        .search-icon-inside { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); pointer-events: none; }
        .smart-search:focus { border-color: var(--accent-color); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(235, 10, 30, 0.3); }

        .nav-actions { display: flex; gap: 12px; align-items: center; }
        .icon-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: #fff; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .icon-btn i { width: 18px; height: 18px; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: translateY(-2px); }

        .garage-btn { border-color: #f39c12; color: #f39c12; }
        .cart-btn { background: white; color: black; font-weight: bold; }

        /* --- PREMIUM BADGE --- */
        .premium-badge {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #000;
            padding: 8px 15px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            font-size: 0.75rem;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
            border: 1px solid rgba(255,255,255,0.3);
            animation: shine 2s infinite;
        }
        .premium-badge span { opacity: 0.8; font-weight: bold; font-size: 0.7rem; }
        @keyframes shine {
            0% { box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); }
            50% { box-shadow: 0 0 25px rgba(241, 196, 15, 0.7); }
            100% { box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); }
        }

        /* --- MODAL SYSTEM --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 95%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        #clientsListStep.active-content, #ordersListStep.active-content, #userOrdersStep.active-content, #productViewStep.active-content, #cartStep.active-content, #checkoutStep.active-content { max-width: 800px; }
        .modal-content h2 { margin-bottom: 20px; color: #fff; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888; }
        
        .modal-input, .modal-select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            outline: none;
            font-size: 1rem;
        }
        .modal-select option { background: #1a1a1a; }
        .modal-input:focus { border-color: var(--accent-color); }
        .modal-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .primary-btn { background: var(--accent-color); color: white; }
        .secondary-btn { background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); }
        .danger-btn { background: transparent; color: #ff4444; border: 1px solid #ff4444; margin-top: 20px; font-size: 0.8rem; }
        .danger-btn:hover { background: #ff4444; color: white; }
        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #555; }
        .error-msg { color: var(--accent-color); font-size: 0.85rem; margin-top: 10px; display: none; }

        /* --- TABLES --- */
        .clients-table, .orders-table, .cart-table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; font-size: 0.85rem; }
        .clients-table th, .orders-table th, .cart-table th { text-align: left; padding: 12px; border-bottom: 1px solid var(--glass-border); color: #888; }
        .clients-table td, .orders-table td, .cart-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .status-admin { background: rgba(235, 10, 30, 0.2); color: var(--accent-color); }
        .status-user { background: rgba(255,255,255,0.1); color: #aaa; }
        .status-process { background: rgba(243, 156, 18, 0.2); color: #f39c12; }
        .status-accepted { background: rgba(39, 174, 96, 0.2); color: #27ae60; }
        .status-shipped { background: rgba(52, 152, 219, 0.2); color: #3498db; }

        .action-icon { cursor: pointer; transition: 0.2s; color: #888; }
        .action-icon:hover { color: #fff; }

        /* --- PRODUCT VIEW DETAILS --- */
        .product-view-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; text-align: left; }
        @media (max-width: 600px) { .product-view-container { grid-template-columns: 1fr; } }
        .product-main-img { width: 100%; border-radius: 15px; border: 1px solid var(--glass-border); }
        .product-info-specs { color: #aaa; font-size: 0.9rem; line-height: 1.6; margin: 15px 0; white-space: pre-line; }
        .small-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .small-gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; cursor: pointer; border: 1px solid transparent; }
        .small-gallery img:hover { border-color: var(--accent-color); }

        /* --- PREVIEW IMAGES --- */
        .image-previews { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .preview-box { width: 100%; aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px dashed #444; border-radius: 8px; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- ADMIN BUTTON --- */
        #adminPanelBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--accent-color);
            border-radius: 50%;
            display: none; 
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(235, 10, 30, 0.4);
            z-index: 999;
            animation: spin 10s linear infinite;
        }
        @keyframes spin { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .admin-action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 20px 10px;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .admin-action-btn:hover { background: var(--accent-color); border-color: var(--accent-color); transform: translateY(-5px); }

        .container { max-width: 1200px; margin: 50px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 20px; }
        .product-card { position: relative; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; overflow: hidden; transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1); backdrop-filter: blur(5px); transform-style: preserve-3d; cursor: pointer; }
        .product-card:hover { transform: translateY(-10px) rotateX(5deg) rotateY(-5deg); border-color: var(--accent-color); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .product-img { width: 100%; height: 200px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); margin-bottom: 15px; }
        .old-price { text-decoration: line-through; color: #777; font-size: 0.9rem; margin-right: 10px; }
        .price { font-size: 1.4rem; font-weight: bold; color: var(--accent-color); margin-bottom: 20px; display: inline-block; }
        .buy-btn { position: relative; width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent-color); color: #fff; text-transform: uppercase; font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; overflow: hidden; z-index: 2; }
        .buy-btn::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: var(--accent-color); z-index: -1; transform: scaleX(0); transition: 0.4s; }
        .buy-btn:hover::after { transform: scaleX(1); }

        /* --- АДМИН КНОПКИ НА КАРТОЧКЕ --- */
        .admin-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .admin-card-btn {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid var(--glass-border);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .admin-card-btn:hover { background: var(--accent-color); border-color: var(--accent-color); }
        .admin-card-btn.del:hover { background: #ff4444; border-color: #ff4444; }

        /* --- НОВЫЕ СТИЛИ ДЛЯ ВЫБОРА КОЛИЧЕСТВА --- */
        .qty-controls {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            margin-top: 0;
        }
        .qty-btn-inc {
            cursor: pointer;
            border: none;
            background: var(--accent-color);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .qty-btn-inc:hover { transform: scale(1.1); box-shadow: 0 0 10px var(--accent-color); }
        .qty-input-num {
            width: 40px;
            text-align: center;
            border: none;
            background: transparent;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            outline: none;
        }
        .hidden { display: none !important; }

        /* --- SIDE CATALOG STYLES --- */
        .side-catalog {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            background: var(--modal-bg);
            border-right: 1px solid var(--glass-border);
            z-index: 1001;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px;
            backdrop-filter: blur(20px);
        }
        .side-catalog.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .catalog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .catalog-list { list-style: none; }
        .catalog-item { margin-bottom: 10px; }
        .catalog-link { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; color: #fff; text-decoration: none; border-radius: 10px;
            background: rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer;
        }
        .catalog-link:hover { background: var(--accent-color); }
        .sub-catalog { padding-left: 20px; margin-top: 5px; display: none; }
        .sub-catalog.active { display: block; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .sub-link { padding: 8px 15px; color: #aaa; text-decoration: none; display: block; font-size: 0.9rem; transition: 0.2s; cursor: pointer; }
        .sub-link:hover { color: #fff; padding-left: 20px; }
    </style>
</head>
<body>

    <div class="side-catalog" id="sideCatalog">
        <div class="catalog-header">
            <h3>Каталог</h3>
            <i data-lucide="x" style="cursor:pointer" onclick="toggleCatalog()"></i>
        </div>
        <ul class="catalog-list" id="mainCatalogList">
            <li class="catalog-item">
                <div class="catalog-link" onclick="filterByCategory('Все')"><span>Все товары</span></div>
            </li>
            </ul>
    </div>

    <div id="adminPanelBtn" onclick="openAdminSettings()">
        <i data-lucide="settings"></i>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content" id="modalMainBox">
            <i data-lucide="x" class="close-modal" onclick="closeModal()"></i>
            <h2 id="modalTitle">Личный кабинет</h2>
            
            <div id="step1">
                <button class="modal-btn primary-btn" onclick="showLogin()">Вход</button>
                <button class="modal-btn secondary-btn" onclick="showRegisterStep1()">Регистрация</button>
            </div>

            <div id="regStep1" style="display:none;">
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="text" id="regPhone" class="modal-input" value="+992 ">
                </div>
                <button class="modal-btn primary-btn" onclick="checkUserExists()">Далее</button>
            </div>

            <div id="regStep2" style="display:none;">
                <div class="form-group">
                    <label>ФИО</label>
                    <input type="text" id="regName" class="modal-input" placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label>Адрес</label>
                    <input type="text" id="regAddress" class="modal-input" placeholder="г. Душанбе, ул...">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPass" class="modal-input">
                </div>
                <button class="modal-btn primary-btn" onclick="completeRegistration()">Создать аккаунт</button>
            </div>

            <div id="loginStep" style="display:none;">
                <p id="userExistNotice" style="color: #888; margin-bottom: 10px; display:none;">Пользователь существует!</p>
                <div class="form-group">
                    <label>Номер телефона / Логин</label>
                    <input type="text" id="loginPhone" class="modal-input" value="+992 ">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPass" class="modal-input">
                </div>
                <button class="modal-btn primary-btn" onclick="handleLogin()">Войти</button>
                <div id="loginError" class="error-msg">Неверный пароль или номер!</div>
            </div>

            <div id="profileStep" style="display:none;">
                <div id="userFields">
                    <div class="form-group">
                        <label>Изменить ФИО / Название</label>
                        <input type="text" id="editName" class="modal-input">
                    </div>
                    <div class="form-group" id="addressGroup">
                        <label>Изменить адрес</label>
                        <input type="text" id="editAddress" class="modal-input">
                    </div>
                </div>
                <button class="modal-btn primary-btn" onclick="updateProfile()">Сохранить изменения</button>
                
                <button id="viewUserOrdersBtn" class="modal-btn secondary-btn" style="margin-top:10px" onclick="showUserOrders()">
                    <i data-lucide="package" style="width:16px; vertical-align:middle;"></i> Мои заказы
                </button>

                <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
                <div class="form-group">
                    <label>Старый пароль</label>
                    <input type="password" id="oldPass" class="modal-input" placeholder="Введите старый пароль">
                </div>
                <div class="form-group">
                    <label>Новый пароль</label>
                    <input type="password" id="newPass" class="modal-input">
                </div>
                <button class="modal-btn secondary-btn" onclick="changePassword()">Изменить пароль</button>
                <button class="modal-btn secondary-btn" style="margin-top:20px" onclick="logout()">Выйти из аккаунта</button>
                
                <div id="deleteSection" style="margin-top:20px; border-top: 1px solid #333; padding-top: 10px;">
                    <div class="form-group">
                        <label>Для удаления введите пароль</label>
                        <input type="password" id="deletePass" class="modal-input">
                    </div>
                    <button class="modal-btn danger-btn" onclick="deleteAccount()">Удалить аккаунт навсегда</button>
                </div>
            </div>

            <div id="userOrdersStep" style="display:none;">
                <div style="overflow-x: auto;">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>Товар</th>
                                <th>Дата / Время</th>
                                <th>Статус</th>
                            </tr>
                        </thead>
                        <tbody id="userOrdersTableBody"></tbody>
                    </table>
                </div>
                <button class="modal-btn secondary-btn" style="margin-top:20px" onclick="showProfile()">Назад</button>
            </div>

            <div id="productViewStep" style="display:none;">
                <div id="productViewContent"></div>
            </div>

            <div id="adminSettingsStep" style="display:none;">
                <div class="admin-grid">
                    <div class="admin-action-btn" onclick="showAddProduct()">
                        <i data-lucide="plus-square"></i>
                        <span>Добавить товар</span>
                    </div>
                    <div class="admin-action-btn" onclick="showOrdersList()">
                        <i data-lucide="shopping-bag"></i>
                        <span>Заказы</span>
                    </div>
                    <div class="admin-action-btn" id="adminUsersBtn" onclick="showClientsList()">
                        <i data-lucide="users"></i>
                        <span>Клиенты</span>
                    </div>
                    <div class="admin-action-btn" onclick="showCategoryManager()">
                        <i data-lucide="layers"></i>
                        <span>Категории</span>
                    </div>
                </div>
                <button class="modal-btn secondary-btn" style="margin-top:25px" onclick="showProfile()">Назад в кабинет</button>
            </div>

            <div id="categoryManagerStep" style="display:none;">
                <div class="form-group">
                    <label>Название новой категории</label>
                    <input type="text" id="newCatName" class="modal-input" placeholder="Напр: Диски">
                </div>
                <div class="form-group">
                    <label>Родительский каталог (необязательно)</label>
                    <select id="parentCatSelect" class="modal-select">
                        <option value="">-- Основная категория --</option>
                    </select>
                </div>
                <button class="modal-btn primary-btn" onclick="addNewCategory()">Создать категорию</button>
                <button class="modal-btn secondary-btn" onclick="openAdminSettings()">Назад</button>
            </div>

            <div id="clientsListStep" style="display:none;">
                <div style="overflow-x: auto;">
                    <table class="clients-table">
                        <thead>
                            <tr>
                                <th>Имя</th>
                                <th>Телефон</th>
                                <th>Пароль</th>
                                <th>Статус</th>
                                <th>Действие</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody"></tbody>
                    </table>
                </div>
                <button class="modal-btn secondary-btn" style="margin-top:20px" onclick="openAdminSettings()">Назад</button>
            </div>

            <div id="ordersListStep" style="display:none;">
                <div style="overflow-x: auto;">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>Товар</th>
                                <th>Клиент</th>
                                <th>Статус</th>
                                <th>Управление</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody"></tbody>
                    </table>
                </div>
                <button class="modal-btn secondary-btn" style="margin-top:20px" onclick="openAdminSettings()">Назад</button>
            </div>

            <div id="addProductStep" style="display:none;">
                <div class="form-group">
                    <label>Название товара</label>

                </div>

                <button class="modal-btn secondary-btn" onclick="closeModal()">Продолжить покупки</button>

                    <input type="text" id="orderClientPhone" class="modal-input" value="+992 ">

                    <label>Адрес доставки</label>
                    <input type="text" id="orderClientAddress" class="modal-input" placeholder="г. Душанбе, ул...">

    <header>
        <div class="header-top">
            <a href="#" class="logo">Toyota Genuine</a>
            <button class="catalog-btn" onclick="toggleCatalog()"><i data-lucide="layout-grid"></i> Каталог</button>

                <i data-lucide="search" class="search-icon-inside"></i>
                <input type="text" class="smart-search" placeholder="Поиск запчастей...">

                <a href="#" class="icon-btn" onclick="openModal()"><i data-lucide="user"></i> <span id="userBtnText">Войти</span></a>
                <a href="#" class="icon-btn cart-btn" onclick="showCart()"><i data-lucide="shopping-cart"></i> <span id="cartCounter">0</span></a>

                    <i data-lucide="crown"></i> PREMIUM <span id="premiumExpire"></span>
                </div>
            </div>
        </div>
    </header>

    <div class="container" id="productsContainer"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDkPy6cVOQvhJVMpeLe9YZuh2viP7R4AWw",
            databaseURL: "https://toyota-3a4ef-default-rtdb.firebaseio.com/",
            projectId: "toyota-3a4ef",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TG_TOKEN = "8681756976:AAHIRkRSGduktZCfUeChoABowJ6VH8cwVlg"; 
        const TG_CHAT_ID = "8506743201";

        let uploadedImages = []; 
        let cart = []; 
        let currentEditProductId = null; // Для редактирования
        lucide.createIcons();

        // --- КАТЕГОРИИ (НОВОЕ) ---
        function showCategoryManager() {
            resetModals();
            document.getElementById('categoryManagerStep').style.display = 'block';
            document.getElementById('modalTitle').innerText = "Управление категориями";
            loadCategoriesToSelect();
        }

        async function loadCategoriesToSelect() {
            const snap = await db.ref('site_categories').once('value');
            const data = snap.val();
            const parentSelect = document.getElementById('parentCatSelect');
            const prodSelect = document.getElementById('prodCategory');
            
            parentSelect.innerHTML = '<option value="">-- Основная категория --</option>';
            prodSelect.innerHTML = '';

            if(data) {
                Object.keys(data).forEach(id => {
                    const c = data[id];
                    // Только основные категории могут быть родителями
                    if(!c.parentId) {
                        parentSelect.innerHTML += `<option value="${id}">${c.name}</option>`;
                    }
                    prodSelect.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                });
            }
        }

        async function addNewCategory() {
            const name = document.getElementById('newCatName').value.trim();
            const parentId = document.getElementById('parentCatSelect').value;
            if(!name) return alert("Введите название!");

            await db.ref('site_categories').push({
                name: name,
                parentId: parentId || null
            });
            
            document.getElementById('newCatName').value = '';
            alert("Категория добавлена!");
            loadCategoriesToSelect();
            updateSideCatalog(); // Обновляем боковое меню
        }

        function updateSideCatalog() {
            db.ref('site_categories').on('value', (snap) => {
                const data = snap.val();
                const list = document.getElementById('mainCatalogList');
                list.innerHTML = `<li class="catalog-item"><div class="catalog-link" onclick="filterByCategory('Все')"><span>Все товары</span></div></li>`;
                
                if(data) {
                    const categories = Object.keys(data).map(id => ({id, ...data[id]}));
                    const mainCats = categories.filter(c => !c.parentId);

                    mainCats.forEach(main => {
                        const subs = categories.filter(c => c.parentId === main.id);
                        if(subs.length > 0) {
                            list.innerHTML += `
                                <li class="catalog-item">
                                    <div class="catalog-link" onclick="toggleSub(this)">
                                        <span>${main.name}</span>
                                        <i data-lucide="chevron-down"></i>
                                    </div>
                                    <div class="sub-catalog">
                                        ${subs.map(s => `<div class="sub-link" onclick="filterByCategory('${s.name}')">${s.name}</div>`).join('')}
                                    </div>
                                </li>`;
                        } else {
                            list.innerHTML += `
                                <li class="catalog-item">
                                    <div class="catalog-link" onclick="filterByCategory('${main.name}')"><span>${main.name}</span></div>
                                </li>`;
                        }
                    });
                    lucide.createIcons();
                }
            });
        }

        // --- OLD FUNCTIONS ---
        function toggleCatalog() {
            document.getElementById('sideCatalog').classList.toggle('open');
        }

        function toggleSub(el) {
            const sub = el.nextElementSibling;
            sub.classList.toggle('active');
            el.style.background = sub.classList.contains('active') ? 'var(--accent-color)' : 'rgba(255,255,255,0.03)';
        }

        function filterByCategory(category) {
            db.ref('products').once('value', (snapshot) => {
                const container = document.getElementById('productsContainer');
                container.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.keys(data).reverse().forEach(id => {
                        const p = data[id];
                        if(category === 'Все' || p.category === category) {
                            renderProductCard(id, p);
                        }
                    });
                    lucide.createIcons();
                }
            });
            if(window.innerWidth < 1000) toggleCatalog();
        }

        // --- ОБНОВЛЕННАЯ ФУНКЦИЯ КАРТОЧКИ ---
        function renderProductCard(id, p) {
            const container = document.getElementById('productsContainer');
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const isAdmin = user && (user.isAdmin || user.phone === 'admin');
            
            const card = document.createElement('article');
            card.className = "product-card";
            card.setAttribute('data-id', id);
            card.onclick = () => openProductDetails(id);
            
            let adminHtml = '';
            if (isAdmin) {
                adminHtml = `
                    <div class="admin-controls">
                        <div class="admin-card-btn" onclick="editProduct('${id}', event)"><i data-lucide="edit-3"></i></div>
                        <div class="admin-card-btn del" onclick="deleteProduct('${id}', event)"><i data-lucide="trash-2"></i></div>
                    </div>
                `;
            }

            card.innerHTML = `
                ${adminHtml}
                <img src="${p.images[0]}" class="product-img">
                <h3 class="product-title">${p.title}</h3>
                <div>
                    ${p.oldPrice ? `<span class="old-price">${p.oldPrice} ₽</span>` : ''}
                    <span class="price">${p.price} ₽</span>
                </div>
                <button class="buy-btn" onclick="buyProduct('${id}', '${p.title}', event, ${p.price})">
                    <i data-lucide="shopping-basket"></i> Купить
                </button>
            `;
            container.appendChild(card);
            lucide.createIcons();
        }

        // --- НОВЫЕ ФУНКЦИИ УПРАВЛЕНИЯ ТОВАРОМ ---
        async function editProduct(id, event) {
            if (event) event.stopPropagation();
            const snap = await db.ref('products/' + id).once('value');
            const p = snap.val();
            if(!p) return;

            currentEditProductId = id;
            showAddProduct();
            document.getElementById('modalTitle').innerText = "Редактирование товара";
            document.getElementById('saveProdBtn').innerText = "Сохранить изменения";
            
            document.getElementById('prodTitle').value = p.title;
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodOldPrice').value = p.oldPrice || '';
            document.getElementById('prodCategory').value = p.category;
            document.getElementById('prodSpecs').value = p.specs || '';
            
            uploadedImages = p.images || [];
            document.getElementById('imagePreviews').innerHTML = uploadedImages.map(img => `<div class="preview-box"><img src="${img}"></div>`).join('');
        }

        async function deleteProduct(id, event) {
            if (event) event.stopPropagation();
            if (confirm("Вы уверены, что хотите удалить этот товар навсегда?")) {
                await db.ref('products/' + id).remove();
                alert("Товар удален");
            }
        }

        async function cleanOldOrders() {
            const twoDaysInMs = 2 * 24 * 60 * 60 * 1000;
            const now = Date.now();
            const threshold = now - twoDaysInMs;
            db.ref('orders').once('value', (snapshot) => {
                const orders = snapshot.val();
                if (orders) {
                    Object.keys(orders).forEach(id => {
                        if (orders[id].timestamp && orders[id].timestamp < threshold) {
                            db.ref('orders/' + id).remove();
                        }
                    });
                }
            });
        }

        async function initAdmin() {
            const snap = await db.ref('admin_settings').once('value');
            if (!snap.exists()) db.ref('admin_settings').set({ login: 'admin', pass: '2004' });
        }
        initAdmin();

        function openModal() { 
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) showProfile();
            else { document.getElementById('authModal').style.display = 'flex'; resetModals(); }
        }
        function closeModal() { document.getElementById('authModal').style.display = 'none'; resetModals(); }

        function resetModals() {
            ['step1', 'regStep1', 'regStep2', 'loginStep', 'profileStep', 'adminSettingsStep', 'addProductStep', 'clientsListStep', 'ordersListStep', 'userOrdersStep', 'productViewStep', 'cartStep', 'checkoutStep', 'categoryManagerStep'].forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.style.display = 'none'; el.classList.remove('active-content'); }
            });
            document.getElementById('modalMainBox').style.maxWidth = '450px';
            document.getElementById('step1').style.display = 'block';
            document.getElementById('modalTitle').innerText = "Личный кабинет";
            currentEditProductId = null; // Сбрасываем ID редактирования
        }

        function showCart() {
            resetModals();
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('step1').style.display = 'none';
            document.getElementById('cartStep').style.display = 'block';
            document.getElementById('cartStep').classList.add('active-content');
            document.getElementById('modalMainBox').style.maxWidth = '800px';
            document.getElementById('modalTitle').innerText = "Ваша корзина";
            renderCartTable();
        }

        function renderCartTable() {
            const body = document.getElementById('cartTableBody');
            const totalEl = document.getElementById('cartTotalSum');
            body.innerHTML = "";
            let total = 0;
            if (cart.length === 0) {
                body.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px;'>Корзина пуста</td></tr>";
                totalEl.innerText = "0";
                return;
            }
            cart.forEach((item) => {
                const sum = item.price * item.quantity;
                total += sum;
                body.innerHTML += `<tr><td>${item.title}</td><td>${item.quantity} шт.</td><td>${sum} ₽</td></tr>`;
            });
            totalEl.innerText = total;
        }

        function showCheckoutForm() {
            if(cart.length === 0) return;
            resetModals();
            document.getElementById('checkoutStep').style.display = 'block';
            document.getElementById('modalTitle').innerText = "Данные для доставки";
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) {
                document.getElementById('orderClientName').value = user.name || "";
                document.getElementById('orderClientPhone').value = user.phone || "+992 ";
                document.getElementById('orderClientAddress').value = user.address || "";
            }
        }

        async function submitFinalOrder() {
            const name = document.getElementById('orderClientName').value;
            const phone = document.getElementById('orderClientPhone').value;
            const address = document.getElementById('orderClientAddress').value;
            if(!name || !phone || !address || phone.length < 10) { alert("Заполните все поля!"); return; }
            const btn = document.getElementById('finalOrderBtn');
            btn.innerText = "Отправка..."; btn.disabled = true;
            try {
                let orderSummary = ""; let totalSum = 0;
                for (let item of cart) {
                    const itemSum = item.price * item.quantity;
                    totalSum += itemSum;
                    orderSummary += `🔹 ${item.title} x${item.quantity} - ${itemSum}₽\n`;
                    await db.ref('orders').push({
                        productId: item.id, productTitle: item.title, clientPhone: phone,
                        clientName: name, clientAddress: address, status: "В процессе",
                        timestamp: Date.now(), quantity: item.quantity, totalPrice: itemSum
                    });
                }
                const message = `🚀 *НОВЫЙ ЗАКАЗ!*\n👤 *Клиент:* ${name}\n📞 *Телефон:* ${phone}\n📍 *Адрес:* ${address}\n📦 *Товары:*\n${orderSummary}\n💰 *ИТОГО:* ${totalSum} ₽`;
                await sendToTelegram(message);
                alert("Заказ успешно оформлен!");
                cart = []; updateCartCounter(); closeModal();
            } catch (e) { alert("Ошибка: " + e.message); } finally { btn.innerText = "Заказать"; btn.disabled = false; }
        }

        async function sendToTelegram(text) {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage`;
            const response = await fetch(url, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
            return response.json();
        }

        function updateCartCounter() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCounter').innerText = count;
        }

        async function openProductDetails(id) {
            const snap = await db.ref('products/' + id).once('value');
            const p = snap.val(); if(!p) return;
            resetModals();
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('step1').style.display = 'none';
            document.getElementById('productViewStep').style.display = 'block';
            document.getElementById('productViewStep').classList.add('active-content');
            document.getElementById('modalMainBox').style.maxWidth = '800px';
            document.getElementById('modalTitle').innerText = p.title;
            const content = document.getElementById('productViewContent');
            content.innerHTML = `
                <div class="product-view-container">
                    <div>
                        <img src="${p.images[0]}" class="product-main-img" id="mainViewImg">
                        <div class="small-gallery">
                            ${p.images.map(img => `<img src="${img}" onclick="document.getElementById('mainViewImg').src='${img}'">`).join('')}
                        </div>
                    </div>
                    <div>
                        <p style="color:var(--accent-color); font-weight:bold; font-size:1.5rem;">${p.price} ₽</p>
                        ${p.oldPrice ? `<p style="text-decoration:line-through; color:#777;">${p.oldPrice} ₽</p>` : ''}
                        <p style="margin-top:10px; color:#888;">Категория: <b>${p.category}</b></p>
                        <div class="product-info-specs"><b>Характеристики:</b><br>${p.specs || 'Нет описания'}</div>
                        <button class="modal-btn primary-btn" onclick="buyProduct('${id}', '${p.title}', event, ${p.price})">Добавить в корзину</button>
                        <button class="modal-btn secondary-btn" onclick="closeModal()">Закрыть</button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function showLogin() { resetModals(); document.getElementById('step1').style.display = 'none'; document.getElementById('loginStep').style.display = 'block'; }
        function showRegisterStep1() { resetModals(); document.getElementById('step1').style.display = 'none'; document.getElementById('regStep1').style.display = 'block'; }

        function showProfile() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            resetModals();
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('step1').style.display = 'none';
            document.getElementById('profileStep').style.display = 'block';
            if(user.isAdmin || user.phone === 'admin') {
                document.getElementById('modalTitle').innerText = "Кабинет Администратора";
                document.getElementById('editName').value = user.name;
                document.getElementById('addressGroup').style.display = 'none';
                document.getElementById('deleteSection').style.display = 'none';
                document.getElementById('viewUserOrdersBtn').style.display = 'none';
            } else {
                document.getElementById('modalTitle').innerText = "Настройки профиля";
                document.getElementById('editName').value = user.name;
                document.getElementById('editAddress').value = user.address;
                document.getElementById('viewUserOrdersBtn').style.display = 'block';
            }
            lucide.createIcons();
        }

        async function showUserOrders() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            resetModals();
            document.getElementById('userOrdersStep').style.display = 'block';
            document.getElementById('modalMainBox').style.maxWidth = '800px';
            document.getElementById('modalTitle').innerText = "История моих заказов";
            db.ref('orders').orderByChild('clientPhone').equalTo(user.phone).on('value', (snapshot) => {
                const orders = snapshot.val(); const tableBody = document.getElementById('userOrdersTableBody');
                tableBody.innerHTML = "";
                if(orders) {
                    Object.keys(orders).reverse().forEach(orderId => {
                        const o = orders[orderId]; const date = new Date(o.timestamp).toLocaleString('ru-RU');
                        let statusClass = o.status === "Принято" ? "status-accepted" : (o.status === "Отправлено" ? "status-shipped" : "status-process");
                        tableBody.innerHTML += `<tr><td>${o.productTitle} x${o.quantity || 1}</td><td>${date}</td><td><span class="status-badge ${statusClass}">${o.status || 'В процессе'}</span></td></tr>`;
                    });
                } else tableBody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px;'>Нет заказов</td></tr>";
            });
        }

        function openAdminSettings() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            resetModals();
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('adminSettingsStep').style.display = 'block';
            document.getElementById('modalTitle').innerText = "Управление сайтом";
            document.getElementById('adminUsersBtn').style.display = (user.phone === 'admin') ? 'flex' : 'none';
            lucide.createIcons();
        }

        async function showOrdersList() {
            resetModals();
            document.getElementById('ordersListStep').style.display = 'block';
            document.getElementById('modalMainBox').style.maxWidth = '800px';
            db.ref('orders').on('value', (snapshot) => {
                const orders = snapshot.val(); const tableBody = document.getElementById('ordersTableBody');
                tableBody.innerHTML = "";
                if(orders) {
                    Object.keys(orders).reverse().forEach(orderId => {
                        const o = orders[orderId];
                        let statusClass = o.status === "Принято" ? "status-accepted" : (o.status === "Отправлено" ? "status-shipped" : "status-process");
                        tableBody.innerHTML += `<tr><td>${o.productTitle} (x${o.quantity || 1})</td><td>${o.clientName}<br><small>${o.clientPhone}</small></td><td><span class="status-badge ${statusClass}">${o.status || 'В процессе'}</span></td><td><select class="modal-select" onchange="updateOrderStatus('${orderId}', this.value)"><option value="">Сменить статус</option><option value="В процессе">В процессе</option><option value="Принято">Принято</option><option value="Отправлено">Отправлено</option></select></td></tr>`;
                    });
                }
            });
        }

        async function updateOrderStatus(orderId, newStatus) {
            if(!newStatus) return;
            let data = { status: newStatus };
            if(newStatus === "Отправлено") { const c = prompt("Номер курьера:"); if(!c) return; data.courierPhone = c; }
            await db.ref('orders/' + orderId).update(data); alert("Обновлено");
        }

        async function showClientsList() {
            resetModals();
            document.getElementById('clientsListStep').style.display = 'block';
            const snapshot = await db.ref('users').once('value');
            const users = snapshot.val(); const tableBody = document.getElementById('clientsTableBody');
            tableBody.innerHTML = "";
            if(users) {
                Object.keys(users).forEach(phone => {
                    const u = users[phone]; const isAdmin = u.isAdmin === true;
                    tableBody.innerHTML += `<tr><td>${u.name}</td><td>${phone}</td><td>${u.pass}</td><td><span class="status-badge ${isAdmin ? 'status-admin' : 'status-user'}">${isAdmin ? 'Админ' : 'Клиент'}</span></td><td><i data-lucide="${isAdmin ? 'shield-off' : 'shield-check'}" class="action-icon" onclick="toggleAdminStatus('${phone}', ${isAdmin})"></i></td></tr>`;
                });
                lucide.createIcons();
            }
        }

        async function toggleAdminStatus(phone, currentlyAdmin) {
            if (currentlyAdmin) { if (confirm("Убрать доступ?")) { await db.ref('users/' + phone).update({ isAdmin: null, adminExpire: null }); showClientsList(); } }
            else { const m = prompt("Срок (мес): 1, 3, 6 или 12?", "1"); if (['1', '3', '6', '12'].includes(m)) { const e = new Date(); e.setMonth(e.getMonth() + parseInt(m)); await db.ref('users/' + phone).update({ isAdmin: true, adminExpire: e.getTime() }); showClientsList(); } }
        }

        function showAddProduct() { resetModals(); document.getElementById('addProductStep').style.display = 'block'; uploadedImages = []; document.getElementById('imagePreviews').innerHTML = ""; loadCategoriesToSelect(); lucide.createIcons(); }

        function handleImageUpload(input) {
            const files = Array.from(input.files).slice(0, 4);
            document.getElementById('imagePreviews').innerHTML = ""; uploadedImages = [];
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        const maxWidth = 800; const scale = maxWidth / img.width;
                        canvas.width = maxWidth; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        uploadedImages.push(canvas.toDataURL('image/jpeg', 0.7));
                        document.getElementById('imagePreviews').innerHTML += `<div class="preview-box"><img src="${uploadedImages[uploadedImages.length-1]}"></div>`;
                    };
                };
                reader.readAsDataURL(file);
            });
        }

        async function saveProduct() {
            const title = document.getElementById('prodTitle').value; const price = document.getElementById('prodPrice').value;
            if(!title || !price || uploadedImages.length === 0) { alert("Заполните поля!"); return; }
            const btn = document.getElementById('saveProdBtn'); btn.innerText = "Загрузка..."; btn.disabled = true;
            
            const productData = { 
                title, 
                price: Number(price), 
                oldPrice: document.getElementById('prodOldPrice').value ? Number(document.getElementById('prodOldPrice').value) : null, 
                category: document.getElementById('prodCategory').value, 
                specs: document.getElementById('prodSpecs').value, 
                images: uploadedImages, 
                timestamp: Date.now() 
            };

            try { 
                if (currentEditProductId) {
                    await db.ref('products/' + currentEditProductId).update(productData);
                    alert("Товар обновлен!");
                } else {
                    await db.ref('products').push(productData);
                    alert("Добавлено!");
                }
                closeModal(); 
            } catch (e) { alert(e.message); } finally { btn.innerText = "Опубликовать"; btn.disabled = false; }
        }

        // --- ИСПРАВЛЕННАЯ ФУНКЦИЯ КУПИТЬ ---
        function buyProduct(prodId, title, event, price) {
            if (event) event.stopPropagation();
            
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(!user) { alert("Сначала войдите!"); openModal(); return; }

            // Находим или создаем товар в корзине
            let cartItem = cart.find(item => item.id === prodId);
            if(cartItem) {
                cartItem.quantity += 1;
            } else {
                cartItem = { id: prodId, title: title, price: price, quantity: 1 };
                cart.push(cartItem);
            }

            // Ищем кнопку в DOM (может быть в каталоге или в модальном окне)
            let targetBtn = (event && event.currentTarget) ? event.currentTarget : null;
            
            // Если вызов не через клик (например, из деталей), ищем кнопку в карточке товара
            if (!targetBtn) {
                const card = document.querySelector(`.product-card[data-id="${prodId}"]`);
                if (card) targetBtn = card.querySelector('.buy-btn');
            }

            // Логика отображения контроллеров количества
            if (targetBtn && !targetBtn.classList.contains('hidden')) {
                targetBtn.classList.add('hidden');
                
                const controls = document.createElement('div');
                controls.className = 'qty-controls';
                controls.onclick = (e) => e.stopPropagation();
                
                controls.innerHTML = `
                    <button class="qty-btn-inc minus">—</button>
                    <input type="text" class="qty-input-num" value="${cartItem.quantity}" readonly>
                    <button class="qty-btn-inc plus">+</button>
                `;
                
                targetBtn.parentNode.insertBefore(controls, targetBtn.nextSibling);

                const input = controls.querySelector('.qty-input-num');
                
                controls.querySelector('.plus').onclick = (e) => {
                    e.stopPropagation();
                    cartItem.quantity += 1;
                    input.value = cartItem.quantity;
                    updateCartCounter();
                };

                controls.querySelector('.minus').onclick = (e) => {
                    e.stopPropagation();
                    if (cartItem.quantity > 1) {
                        cartItem.quantity -= 1;
                        input.value = cartItem.quantity;
                    } else {
                        cart = cart.filter(i => i.id !== prodId);
                        controls.remove();
                        targetBtn.classList.remove('hidden');
                    }
                    updateCartCounter();
                };
            } else if (targetBtn) {
                // Если контроллер уже есть, просто обновляем цифру в нем
                const controls = targetBtn.parentNode.querySelector('.qty-controls');
                if (controls) {
                    controls.querySelector('.qty-input-num').value = cartItem.quantity;
                }
            }

            updateCartCounter();
        }

        function loadProducts() {
            db.ref('products').on('value', (snapshot) => {
                const container = document.getElementById('productsContainer'); container.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.keys(data).reverse().forEach(id => {
                        renderProductCard(id, data[id]);
                    });
                    lucide.createIcons();
                }
            });
        }

        async function checkUserExists() {
            const phone = document.getElementById('regPhone').value.replace(/\s/g, '');
            const snap = await db.ref('users/' + phone).once('value');
            if (snap.exists()) { showLogin(); document.getElementById('loginPhone').value = document.getElementById('regPhone').value; }
            else { document.getElementById('regStep1').style.display = 'none'; document.getElementById('regStep2').style.display = 'block'; }
        }

        function completeRegistration() {
            const phone = document.getElementById('regPhone').value.replace(/\s/g, '');
            const data = { name: document.getElementById('regName').value, address: document.getElementById('regAddress').value, pass: document.getElementById('regPass').value };
            db.ref('users/' + phone).set(data).then(() => { localStorage.setItem('currentUser', JSON.stringify({phone, ...data})); updateUI(); closeModal(); });
        }

        async function handleLogin() {
            const inputVal = document.getElementById('loginPhone').value.trim(); const pass = document.getElementById('loginPass').value;
            if (inputVal === 'admin' || inputVal === '+992 admin') {
                const snap = await db.ref('admin_settings').once('value'); const d = snap.val();
                if (pass === d.pass) { localStorage.setItem('currentUser', JSON.stringify({ phone: 'admin', name: d.login, isAdmin: true })); updateUI(); closeModal(); return; }
            }
            const phone = inputVal.replace(/\s/g, ''); const snap = await db.ref('users/' + phone).once('value');
            if (snap.exists() && snap.val().pass === pass) {
                const u = snap.val(); if (u.isAdmin && u.adminExpire && Date.now() > u.adminExpire) { await db.ref('users/' + phone).update({ isAdmin: null, adminExpire: null }); u.isAdmin = null; }
                localStorage.setItem('currentUser', JSON.stringify({phone, ...u})); updateUI(); closeModal();
            } else document.getElementById('loginError').style.display = 'block';
        }

        async function updateProfile() {
            const user = JSON.parse(localStorage.getItem('currentUser')); const newName = document.getElementById('editName').value;
            if (user.phone === 'admin') await db.ref('admin_settings').update({ login: newName });
            else await db.ref('users/' + user.phone).update({ name: newName, address: document.getElementById('editAddress').value });
            user.name = newName; localStorage.setItem('currentUser', JSON.stringify(user)); updateUI(); alert('Обновлено');
        }

        async function changePassword() {
            const user = JSON.parse(localStorage.getItem('currentUser')); const oldP = document.getElementById('oldPass').value; const newP = document.getElementById('newPass').value;
            let dbP = user.phone === 'admin' ? (await db.ref('admin_settings').once('value')).val().pass : (await db.ref('users/' + user.phone).once('value')).val().pass;
            if (dbP === oldP) { if (user.phone === 'admin') await db.ref('admin_settings').update({ pass: newP }); else await db.ref('users/' + user.phone).update({ pass: newP }); alert('Готово'); }
        }

        async function deleteAccount() {
            const user = JSON.parse(localStorage.getItem('currentUser')); if(user.phone === 'admin') return;
            if ((await db.ref('users/' + user.phone).once('value')).val().pass === document.getElementById('deletePass').value) { if (confirm('Удалить?')) { await db.ref('users/' + user.phone).remove(); logout(); } }
        }

        function logout() { localStorage.removeItem('currentUser'); updateUI(); closeModal(); }

        function updateUI() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const btnText = document.getElementById('userBtnText'); const adminBtn = document.getElementById('adminPanelBtn');
            const premBadge = document.getElementById('premiumBadge'); const premExpire = document.getElementById('premiumExpire');
            if (user) {
                btnText.innerText = user.name; adminBtn.style.display = (user.isAdmin || user.phone === 'admin') ? 'flex' : 'none';
                if (user.isAdmin && user.phone !== 'admin' && user.adminExpire) {
                    premBadge.style.display = 'flex'; const days = Math.ceil((user.adminExpire - Date.now()) / (1000 * 60 * 60 * 24));
                    premExpire.innerText = `(${days} дн.)`;
                } else premBadge.style.display = 'none';
            } else { btnText.innerText = "Войти"; adminBtn.style.display = 'none'; premBadge.style.display = 'none'; }
            
            // Важно перерисовать продукты, чтобы кнопки админа появились/исчезли после логина
            if (document.getElementById('productsContainer').innerHTML !== "") {
                loadProducts();
            }
            
            lucide.createIcons();
        }

        document.querySelectorAll('#regPhone, #loginPhone, #orderClientPhone').forEach(input => {
            input.addEventListener('input', (e) => { if (!e.target.value.startsWith('+992 ')) e.target.value = '+992 '; });
        });

        window.onload = () => { 
            updateUI(); 
            loadProducts(); 
            updateSideCatalog(); // Загружаем боковое меню из БД
            cleanOldOrders();
        };
    </script>
</body>
